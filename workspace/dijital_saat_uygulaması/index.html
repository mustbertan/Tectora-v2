<!DOCTYPE html>
<html lang="tr" data-theme="day">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dijital Saat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <time class="clock" id="clock">
            <span class="time-part" id="hours">00</span>
            <span class="separator">:</span>
            <span class="time-part" id="minutes">00</span>
            <span class="separator">:</span>
            <span class="time-part seconds" id="seconds">00</span>
        </time>
        <button class="theme-toggle" id="themeToggle">
            <span class="theme-icon">🌙</span>
            <span class="theme-label">Gece Modu</span>
        </button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
